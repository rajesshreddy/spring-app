# ----------------------------------------
# SERVER CONFIGURATION
# ----------------------------------------

# Change the default port from 8080 to 8081 (or any port you prefer)
server.port=8081

# Set a context path. This makes your local testing URL match 
# the external Tomcat URL behavior (e.g., localhost:8081/myapp/hello)
server.servlet.context-path=/myapp

# ----------------------------------------
# APPLICATION METADATA
# ----------------------------------------
spring.application.name=myapp-demo